<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condition Report Copilot v1.1 - STEWRD Agent 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { scroll-behavior: smooth; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(61, 92, 69, 0.2);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(61, 92, 69, 0.4);
        }

        /* Heritage Color Palette */
        :root {
            --primary: #3D5C45;
            --cream: #F5F1E8;
            --alert: #9B5B5B;
            --good: #A8C9C3;
            --text: #7A8B85;
            --light-bg: #FAF9F6;
            --border: #E8E4DA;
            --text-muted: #9AA59F;

            /* Spacing tokens (8px base) */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;

            /* Border radius tokens */
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            --radius-pill: 9999px;

            /* Shadow tokens */
            --shadow-sm: 0 1px 3px rgba(61,92,69,0.06), 0 1px 2px rgba(61,92,69,0.04);
            --shadow-md: 0 4px 12px rgba(61,92,69,0.08), 0 2px 4px rgba(61,92,69,0.04);
            --shadow-lg: 0 8px 24px rgba(61,92,69,0.12), 0 4px 8px rgba(61,92,69,0.06);
        }

        body {
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-feature-settings: 'cv01', 'ss03';
            background: linear-gradient(135deg, var(--cream) 0%, #f8f6f1 100%);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 500;
            background: var(--primary);
            color: var(--cream);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(61, 92, 69, 0.2);
        }

        .mobile-menu-toggle:active {
            transform: scale(0.95);
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            box-shadow: 4px 0 12px rgba(61, 92, 69, 0.06);
            transition: transform 0.2s ease;
        }

        @media (max-width: 768px) {
            .app-container {
                position: relative;
            }

            .app-container::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s ease;
                z-index: 350;
            }

            .app-container.sidebar-open::before {
                opacity: 1;
                pointer-events: auto;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 400;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .sidebar-header {
            padding: 24px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #2d4435 100%);
            color: var(--cream);
            border-bottom: none;
            box-shadow: 0 2px 8px rgba(61, 92, 69, 0.12);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .sidebar-sections {
            padding: 16px 10px;
        }

        .section-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            margin: 4px 0;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: var(--light-bg);
            color: var(--text);
            font-weight: 400;
            font-size: 14px;
            line-height: 1.4;
            -webkit-tap-highlight-color: transparent;
            min-height: 44px;
        }

        .section-item:hover {
            background: rgba(61, 92, 69, 0.08);
            color: var(--primary);
        }

        .section-item:active {
            transform: translateX(0);
        }

        .section-item.active {
            background: linear-gradient(135deg, rgba(168, 201, 195, 0.3) 0%, rgba(168, 201, 195, 0.15) 100%);
            border: 1px solid rgba(168, 201, 195, 0.5);
            color: var(--primary);
            font-weight: 500;
            box-shadow: inset 0 2px 8px rgba(168, 201, 195, 0.1);
        }

        @media (max-width: 768px) {
            .section-item {
                padding: 16px 14px;
                font-size: 13px;
            }

            .section-item i {
                font-size: 16px;
            }
        }

        .section-badge {
            margin-left: auto;
            font-size: 11px;
            background: var(--primary);
            color: var(--cream);
            padding: 3px 8px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            letter-spacing: 0;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-top: 0;
            }
        }

        .form-header {
            background: linear-gradient(135deg, var(--primary) 0%, #2d4435 100%);
            color: var(--cream);
            border-bottom: none;
            box-shadow: 0 4px 16px rgba(61, 92, 69, 0.12);
            position: relative;
            z-index: 100;
        }

        .form-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            gap: 16px;
            border-bottom: 1px solid rgba(245, 241, 232, 0.15);
        }

        .form-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            flex: 1;
        }

        @media (max-width: 768px) {
            .form-header-top {
                flex-direction: column;
                align-items: flex-start;
                padding: 16px 16px;
                gap: 12px;
            }

            .form-header h2 {
                font-size: 20px;
                margin-top: 30px;
            }

            .progress-text {
                font-size: 11px;
            }
        }

        .form-header-buttons-row {
            padding: 16px 32px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid rgba(245, 241, 232, 0.15);
        }

        @media (max-width: 768px) {
            .form-header-buttons-row {
                padding: 12px 16px;
                gap: 8px;
                justify-content: center;
            }

            .btn-action {
                padding: 10px 14px;
                font-size: 12px;
                min-height: 44px;
                flex: 0 1 auto;
            }

            .btn-action span {
                display: none;
            }

            .btn-action i {
                margin: 0;
            }

            .save-indicator {
                display: none;
            }
        }

        .form-header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.8px;
        }

        .form-header-actions {
            display: contents;
        }

        .btn-action {
            background: rgba(168, 201, 195, 0.95);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-action:hover {
            background: var(--good);
            box-shadow: var(--shadow-md);
        }

        .btn-action:active {
            /* no transform */
        }

        .btn-action.primary {
            background: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .btn-action.primary:hover {
            background: #2d4435;
            box-shadow: var(--shadow-md);
        }

        .form-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .form-section {
            background: white;
            border-radius: var(--radius-2xl);
            padding: 32px;
            margin-bottom: 32px;
            border-left: none;
            border-top: 2px solid var(--good);
            box-shadow: var(--shadow-md);
            display: none;
            transition: all 0.2s ease;
        }

        @media (max-width: 768px) {
            .form-content {
                padding: 16px;
            }

            .form-section {
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 20px;
            }

            .form-section h2 {
                font-size: 20px;
                margin-bottom: 16px;
                padding-bottom: 12px;
            }
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-section h2 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 28px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        /* SECTION LAYOUT: Preview (top) | Entry + Entered (bottom) */
        .section-layout {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .section-layout-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }

        @media (max-width: 768px) {
            .section-layout-bottom {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .section-part-title {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 14px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            font-size: 12px;
            opacity: 0.9;
        }

        .section-part-title i {
            color: var(--good);
            font-size: 15px;
        }

        /* FORM GROUP */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        @media (max-width: 768px) {
            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                font-size: 13px;
                margin-bottom: 8px;
            }
        }

        .required-indicator {
            color: var(--alert);
            font-weight: 700;
            margin-left: 4px;
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 32px 14px 32px;
            background: rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .progress-bar-container {
                padding: 10px 16px;
                gap: 10px;
            }
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(245, 241, 232, 0.3);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--good);
            width: 0%;
            transition: width 0.2s ease;
            border-radius: 3px;
        }

        .progress-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--cream);
            white-space: nowrap;
        }

        .validation-warning {
            background: rgba(155, 91, 91, 0.15);
            border: 1px solid rgba(155, 91, 91, 0.3);
            color: var(--alert);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 500;
        }

        .validation-warning ul {
            margin: 8px 0 0 20px;
            padding: 0;
            font-size: 12px;
        }

        .validation-warning li {
            margin: 4px 0;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text);
            font-size: 14px;
            background: white;
            line-height: 1.5;
            transition: all 0.2s ease;
            font-family: inherit;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 110px;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder,
        .form-group select::placeholder {
            color: rgba(122, 139, 133, 0.5);
        }

        .form-group input:hover,
        .form-group textarea:hover,
        .form-group select:hover {
            border-color: rgba(61, 92, 69, 0.3);
            box-shadow: 0 2px 8px rgba(61, 92, 69, 0.05);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(61, 92, 69, 0.12), 0 2px 8px rgba(61, 92, 69, 0.08);
            background: white;
        }

        @media (max-width: 768px) {
            .form-group input,
            .form-group textarea,
            .form-group select {
                font-size: 16px;
                padding: 14px 16px;
            }

            .form-group textarea {
                min-height: 120px;
            }
        }

        /* PHOTO UPLOAD */
        .photo-upload-btn {
            padding: 20px 16px;
            border: 2px dashed var(--good);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(168, 201, 195, 0.08);
            color: var(--primary);
            font-weight: 500;
        }

        .photo-upload-btn:hover {
            border-color: var(--primary);
            background: rgba(61, 92, 69, 0.08);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(61, 92, 69, 0.08);
        }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        @media (max-width: 768px) {
            .photo-gallery {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px;
            }
        }

        .photo-item {
            position: relative;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            transition: all 0.25s ease;
        }

        .photo-item:hover {
            box-shadow: 0 4px 12px rgba(61, 92, 69, 0.08);
            transform: translateY(-2px);
        }

        .photo-item img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }

        .photo-item-caption {
            padding: 10px;
            font-size: 12px;
            background: var(--light-bg);
            word-break: break-word;
            line-height: 1.3;
            color: var(--text);
        }

        .photo-remove {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--alert);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(155, 91, 91, 0.3);
        }

        .photo-remove:hover {
            background: #8a4949;
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(155, 91, 91, 0.4);
        }

        /* BUTTONS */
        .btn-add {
            background: var(--good);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn-add:hover {
            background: #96b7b2;
            box-shadow: var(--shadow-md);
        }

        .btn-add:active {
            /* no transform */
        }

        .btn-remove {
            background: rgba(155, 91, 91, 0.1);
            color: var(--alert);
            border: 1px solid rgba(155, 91, 91, 0.2);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-remove:hover {
            background: rgba(155, 91, 91, 0.15);
            border-color: rgba(155, 91, 91, 0.3);
            transform: translateY(-1px);
        }

        /* PREVIEW CARD */
        .preview-card {
            background: linear-gradient(135deg, rgba(61, 92, 69, 0.04) 0%, rgba(168, 201, 195, 0.04) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 18px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .preview-card:hover {
            box-shadow: 0 4px 12px rgba(61, 92, 69, 0.06);
        }

        .preview-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(61, 92, 69, 0.1);
            margin-bottom: 14px;
            user-select: none;
            transition: all 0.2s ease;
        }

        .preview-header:hover {
            color: var(--primary);
        }

        .preview-title {
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .preview-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease;
        }

        .preview-content.open {
            max-height: 600px;
        }

        .preview-item {
            margin-bottom: 10px;
            padding: 12px 10px;
            background: white;
            border-radius: var(--radius-md);
            font-size: 13px;
            border-left: 2px solid var(--good);
        }

        .preview-label {
            display: block;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 12px;
            letter-spacing: 0.2px;
        }

        .preview-value {
            display: block;
            color: var(--text);
            word-break: break-word;
            line-height: 1.4;
        }

        /* ENTERED ENTRIES */
        .entered-entries {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .entry-item {
            background: linear-gradient(135deg, rgba(168, 201, 195, 0.05) 0%, transparent 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .entry-item:hover {
            box-shadow: 0 2px 8px rgba(61, 92, 69, 0.06);
            border-color: rgba(168, 201, 195, 0.3);
        }

        .entry-item:last-child {
            margin-bottom: 0;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .entry-title {
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.2px;
        }

        .entry-content {
            color: var(--text);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .entry-photos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .entry-photo {
            width: 90px;
            height: 90px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            transition: all 0.25s ease;
        }

        .entry-photo:hover {
            box-shadow: 0 4px 10px rgba(61, 92, 69, 0.08);
            transform: translateY(-2px);
        }

        .entry-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .copy-feedback {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--good);
            color: white;
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: 0 12px 32px rgba(168, 201, 195, 0.4);
            z-index: 2000;
            display: none;
            font-weight: 600;
            font-size: 15px;
            align-items: center;
            gap: 10px;
        }

        .copy-feedback.show {
            display: flex;
            animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .copy-feedback i {
            font-size: 18px;
        }

        @keyframes slideIn {
            from { transform: translateX(420px); opacity: 0; }

        function setupMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('mobileMenuToggle');
            const appContainer = document.querySelector('.app-container');

            // Close sidebar when clicking on a section (mobile only)
            document.querySelectorAll('.section-item').forEach(item => {
                item.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                        appContainer.classList.remove('sidebar-open');
                    }
                });
            });

            // Close sidebar when clicking outside (mobile only)
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                    if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
                        sidebar.classList.remove('open');
                        appContainer.classList.remove('sidebar-open');
                    }
                }
            });
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');

                if (section.isComplex) {
                    hasData = (complexData[section.id] || []).length > 0;

                    const data = formData[section.id] || {};
                    hasData = Object.values(data).some(v => v && String(v).trim());

                                </tr>`;
                            });

                            html += `<tr style="background: #fafafa; border-bottom: 2px solid var(--border);">
                                <td style="padding: 12px; border-right: 1px solid var(--border); font-weight: 600; color: var(--text);">Cost for ${elementName}</td>
                                <td style="padding: 12px; text-align: right;">
                                    <input type="number" class="cost-input-${sectionId}" data-element="${elementName}" value="${cost}" placeholder="0.00" step="0.01" min="0"
                                        style="width: 120px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; text-align: right; font-weight: 600; font-size: 12px;"
                                        onchange="updateCostSummary(10)">
                                </td>
                            </tr></table></div>`;
                        });

                        html += `<div style="background: var(--primary); color: white; padding: 16px 14px; border-radius: 6px; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                            <span>TOTAL ESTIMATED COST</span>
                            <span id="grand-total-${sectionId}" style="font-size: 16px;">$0.00</span>
                        </div></div>`;
                    } else {
                        html = '<p style="color: var(--text); font-size: 13px; margin: 0; padding: 16px;">Add defects first to create cost estimates by element</p>';
                    }
                } else {
                    // Standard table for Exterior/Interior sections with grouping
                    if (complexData[sectionId] && complexData[sectionId].length > 0) {
                        // Group entries by room/location
                        const grouped = {};
                        complexData[sectionId].forEach((entry) => {
                            const room = entry.room || 'Ungrouped';
                            if (!grouped[room]) {
                                grouped[room] = [];
                            }
                            grouped[room].push(entry);
                        });

                        html = '<div style="font-size: 13px;">';
                        Object.keys(grouped).sort().forEach((roomName) => {
                            const entries = grouped[roomName];
                            html += '<div style="margin-bottom: 16px;"><div style="background: var(--primary); color: white; padding: 10px 12px; border-radius: 6px 6px 0 0; font-weight: 600; display: flex; justify-content: space-between; align-items: center;"><span><strong>' + roomName + '</strong></span><span style="font-size: 12px; background: rgba(255,255,255,0.3); padding: 2px 8px; border-radius: 12px;">' + entries.length + ' ' + (entries.length === 1 ? 'item' : 'items') + '</span></div><table style="width: 100%; border-collapse: collapse; font-size: 13px;"><tr style="background: #f9f9f9; border-bottom: 2px solid var(--border);"><th style="padding: 8px 10px; text-align: left; border: 1px solid #ddd; width: 15%;">Ref #</th><th style="padding: 8px 10px; text-align: left; border: 1px solid #ddd; width: 45%;">Description</th><th style="padding: 8px 10px; text-align: left; border: 1px solid #ddd; width: 25%;">Photos</th><th style="padding: 8px 10px; text-align: center; border: 1px solid #ddd; width: 15%; min-width: 80px;">Actions</th></tr>';
                            entries.forEach((entry) => {
                                const globalIdx = complexData[sectionId].indexOf(entry);
                                let photoHtml = '—';
                                if (entry.photos && entry.photos.length > 0) {
                                    photoHtml = '<div style="display: flex; gap: 4px; flex-wrap: wrap;">';
                                    entry.photos.slice(0, 3).forEach((photo) => {
                                        const photoSrc = photo.base64 || photo.data || '';
                                        photoHtml += '<img src="' + photoSrc + '" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;" title="' + photo.name + '">';
                                    });
                                    if (entry.photos.length > 3) {
                                        photoHtml += '<div style="width: 40px; height: 40px; background: var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--primary);">+' + (entry.photos.length - 3) + '</div>';
                                    }
                                    photoHtml += '</div>';
                                }
                                html += '<tr style="background: var(--light-bg); border-bottom: 1px solid #ddd;"><td style="padding: 10px; border: 1px solid #ddd; font-weight: 600; color: var(--primary);">' + entry.part + '</td><td style="padding: 10px; border: 1px solid #ddd;">' + entry.notes + '</td><td style="padding: 10px; border: 1px solid #ddd;">' + photoHtml + '</td><td style="padding: 10px; border: 1px solid #ddd; text-align: center; white-space: nowrap;"><button onclick="editComplexEntry(' + sectionId + ', ' + globalIdx + ')" style="background: none; border: none; cursor: pointer; color: #3D5C45; font-size: 14px; padding: 4px 6px; margin-right: 4px;" title="Edit">✎</button><button onclick="removeComplexEntry(' + sectionId + ', ' + globalIdx + ')" style="background: none; border: none; cursor: pointer; color: #9B5B5B; font-size: 16px; padding: 4px 6px;" title="Delete">✕</button></td></tr>';
                            });
                            html += '</table></div>';
                        });
                        html += '</div>';
                    } else {
                        html = '<p style="color: var(--text); font-size: 13px; margin: 0;">—</p>';
                    }
                }
            } else {
                // Simple format for regular sections
                const data = formData[sectionId] || {};
                const photos = photoData[sectionId] || [];

                // Define labels for yes/no fields
                const yesNoLabels = {
                    rcdPresent: 'Safety Switch (RCD) Present?',
                    waterIngress: 'Water Ingress Present?',
                    asbestos: 'Asbestos Present?'
                };

                if (Object.keys(data).length > 0 || photos.length > 0) {
                    html = '<div style="font-size: 13px; line-height: 1.6;">';
                    Object.entries(data).forEach(([key, value]) => {
                        if (value) {
                            const label = yesNoLabels[key] || key;
                            html += `<div style="margin-bottom: 8px;"><strong>${label}:</strong> ${value}</div>`;
                        }
                    });
                    if (photos.length > 0) {
                        html += `<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">
                            <div style="margin-bottom: 8px;"><strong>📸 Photos (${photos.length}):</strong></div>
                            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">`;
                        photos.forEach(photo => {
                            html += `<img src="${photo.base64}" style="width: 80px; height: 80px; object-fit: cover; border: 1px solid var(--border); border-radius: 4px;">`;
                        });
                        html += '</div></div>';
                    }
                    html += '</div>';
                } else {
                    html = '<p style="color: var(--text); font-size: 13px; margin: 0;">—</p>';
                }
            }

            if (preview) {
                preview.innerHTML = html;
                // Initialize cost summary calculations after rendering
                if (sectionId === 10) {
                    setTimeout(() => updateCostSummary(10), 100);
                }
            }
        }

        function editComplexEntry(sectionId, idx) {
            const entry = complexData[sectionId][idx];
            // Populate form fields
            document.getElementById(`part-${sectionId}`).value = entry.part;
            document.getElementById(`notes-${sectionId}`).value = entry.notes;
            const roomField = document.getElementById(`room-${sectionId}`);
            if (roomField) {
                roomField.value = entry.room || '';
            }
            if (sectionId === 9) {
                document.getElementById(`priority-${sectionId}`).value = entry.priority;
                document.getElementById(`suggestedWork-${sectionId}`).value = entry.suggestedWork || '';
            }
            // Set editing state
            editingIndex = idx;
            // Change button label
            const btn = document.querySelector(`#entryForm-${sectionId} .btn-add`);
            if (btn) {
                btn.innerHTML = '<i class="fas fa-save"></i> Update Entry';
                btn.style.background = '#C4A56B';
            }
            // v1.1: Show cancel button
            const cancelBtn = document.getElementById(`cancel-edit-${sectionId}`);
            if (cancelBtn) cancelBtn.style.display = 'flex';
            // Scroll to form
            document.getElementById(`entryForm-${sectionId}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function addComplexEntry(sectionId) {
            const part = document.getElementById(`part-${sectionId}`).value;
            const notes = document.getElementById(`notes-${sectionId}`).value;
            const roomField = document.getElementById(`room-${sectionId}`);
            const room = roomField ? roomField.value : '';

            const isCosts = sectionId === 10;
            const isDefects = sectionId === 9;
            const isInteriorExterior = sectionId === 7 || sectionId === 8;
            let missingField = '';

            if (!part) {
                missingField = isCosts ? 'item description' : 'ref number';
            } else if (!notes) {
                missingField = isCosts ? 'estimated cost' : 'description';
            } else if ((isInteriorExterior || isDefects) && !room) {
                if (isDefects) missingField = 'element/building part';
                else missingField = sectionId === 7 ? 'location/area' : 'room/space';
            }

            if (missingField) {
                alert(`Please enter the ${missingField}`);
                return;
            }

            // For cost section, validate that cost is a valid number
            if (isCosts && isNaN(parseFloat(notes))) {
                alert('Please enter a valid cost amount (numbers only)');
                return;
            }

            if (!complexData[sectionId]) {
                complexData[sectionId] = [];
            }

            const entry = {
                part,
                notes,
                photos: tempComplexPhotos[sectionId] || []
            };

            // Add room/element field for interior/exterior/defects
            if (isInteriorExterior || isDefects) {
                entry.room = room;
            }

            // Add defect-specific fields
            if (isDefects) {
                const priority = document.getElementById(`priority-${sectionId}`).value;
                const suggestedWork = document.getElementById(`suggestedWork-${sectionId}`).value;

                if (!priority) {
                    alert('Please select a priority level');
                    return;
                }

                entry.priority = priority;
                entry.suggestedWork = suggestedWork;
            }

            // Handle edit mode vs add mode
            if (editingIndex !== null) {
                complexData[sectionId].splice(editingIndex, 1, entry);
                editingIndex = null;
                // Reset button
                const btn = document.querySelector(`#entryForm-${sectionId} .btn-add`);
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-plus"></i> Add Entry';
                    btn.style.background = '';
                }
                // v1.1: hide cancel button
                const cancelBtn = document.getElementById(`cancel-edit-${sectionId}`);
                if (cancelBtn) cancelBtn.style.display = 'none';
            } else {
                complexData[sectionId].push(entry);
            }

            document.getElementById(`part-${sectionId}`).value = '';
            document.getElementById(`notes-${sectionId}`).value = '';
            const roomFieldClear = document.getElementById(`room-${sectionId}`);
            if (roomFieldClear) {
                roomFieldClear.value = '';
            }

            if (sectionId === 9) {
                document.getElementById(`priority-${sectionId}`).value = '';
                document.getElementById(`suggestedWork-${sectionId}`).value = '';
                // Also update cost summary when defects change
                updatePreview(10);
                updateEnteredEntries(10);
            } else {
                document.getElementById(`gallery-${sectionId}`).innerHTML = '';
                tempComplexPhotos[sectionId] = [];
            }

            saveFormData();
            updatePreview(sectionId);
            updateProgress();
            updateSectionBadges();
        }

        function updateSectionBadges() {
            sections.forEach(section => {
                const badge = document.getElementById(`badge-${section.id}`);
                if (!badge) return;

                let count = 0;

                if (section.isComplex) {
                    // Count complex entries
                    if (complexData[section.id] && complexData[section.id].length > 0) {
                        count = complexData[section.id].length;
                    }
                } else {
                    // Count filled form fields
                    const data = formData[section.id] || {};
                    Object.values(data).forEach(value => {
                        if (value && String(value).trim()) count++;
                    });
                    // Add photo count
                    if (photoData[section.id]) {
                        count += photoData[section.id].length;
                    }
                }

                badge.textContent = count > 0 ? count : '—';
                badge.style.opacity = count > 0 ? '1' : '0.5';
            });
            updateCompletionDots(); // v1.1
        }

        function updateCostSummary(sectionId) {
            // Collect all cost inputs
            if (!formData[sectionId]) {
                formData[sectionId] = {};
            }

            const inputs = document.querySelectorAll(`.cost-input-${sectionId}`);
            let grandTotal = 0;

            inputs.forEach(input => {
                const element = input.getAttribute('data-element');
                const cost = parseFloat(input.value) || 0;
                formData[sectionId][element] = cost;
                grandTotal += cost;
            });

            // Update grand total display
            const totalDisplay = document.getElementById(`grand-total-${sectionId}`);
            if (totalDisplay) {
                totalDisplay.textContent = `$${grandTotal.toFixed(2)}`;
            }

            // Save to localStorage
            saveFormData();
            updateProgress();
            updateSectionBadges();
            updateEnteredEntries(sectionId);
        }

        function updateEnteredEntries(sectionId) {
            const entered = document.getElementById(`entered-${sectionId}`);
            const section = sections.find(s => s.id === sectionId);

            let html = '';

            if (section.isComplex) {
                // Special case: Cost Summary (section 10) stores costs in formData[10], not complexData[10]
                if (sectionId === 10) {
                    const costs = formData[10] || {};
                    const costEntries = Object.entries(costs).filter(([k, v]) => parseFloat(v) > 0);
                    if (costEntries.length > 0) {
                        let total = 0;
                        html = '<div style="font-size: 12px;">';
                        costEntries.forEach(([element, cost]) => {
                            const c = parseFloat(cost);
                            total += c;
                            html += `<div style="margin-bottom: 8px; display: flex; justify-content: space-between;"><strong>${element}:</strong> <span style="color: var(--primary); font-weight: 600;">$${c.toFixed(2)}</span></div>`;
                        });
                        html += `<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 700; color: var(--primary);"><strong>Total:</strong> <span>$${total.toFixed(2)}</span></div>`;
                        html += '</div>';
                    } else {
                        html = '<p style="color: var(--text); margin: 0;">Enter costs in the table on the left</p>';
                    }
                } else if (complexData[sectionId] && complexData[sectionId].length > 0) {
                    html = '<ul style="margin: 0; padding-left: 20px; list-style: disc;">';
                    complexData[sectionId].forEach((entry, idx) => {
                        html += `<li style="margin-bottom: 6px;"><strong>${entry.part}</strong> • ${entry.notes.substring(0, 40)}${entry.notes.length > 40 ? '...' : ''} ${entry.photos && entry.photos.length > 0 ? `[${entry.photos.length} 📸]` : ''} <button class="btn-remove" onclick="removeComplexEntry(${sectionId}, ${idx})" style="margin-left: 8px;">✕</button></li>`;
                    });
                    html += '</ul>';
                } else {
                    html = '<p style="color: var(--text); margin: 0;">—</p>';
                }
            } else {
                const data = formData[sectionId] || {};
                const photos = photoData[sectionId] || [];

                // Special handling for cost summary section
                if (sectionId === 10) {
                    if (Object.keys(data).length > 0) {
                        html = '<div style="font-size: 12px;">';
                        let total = 0;
                        Object.entries(data).forEach(([key, value]) => {
                            const cost = parseFloat(value) || 0;
                            total += cost;
                            if (cost > 0) {
                                html += `<div style="margin-bottom: 8px; display: flex; justify-content: space-between;"><strong>${key}:</strong> <span style="color: var(--primary); font-weight: 600;">$${cost.toFixed(2)}</span></div>`;
                            }
                        });
                        if (total > 0) {
                            html += `<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 700; color: var(--primary);"><strong>Total:</strong> <span>$${total.toFixed(2)}</span></div>`;
                        }
                        html += '</div>';
                    } else {
                        html = '<p style="color: var(--text); margin: 0;">—</p>';
                    }
                } else {
                    if (Object.keys(data).length > 0 || photos.length > 0) {
                        html = '<ul style="margin: 0; padding-left: 20px; list-style: disc;">';
                        Object.entries(data).forEach(([key, value]) => {
                            if (value) {
                                html += `<li style="margin-bottom: 6px;"><strong>${key}:</strong> ${value.substring(0, 50)}${value.length > 50 ? '...' : ''}</li>`;
                            }
                        });
                        if (photos.length > 0) {
                            html += `<li style="margin-bottom: 6px;"><strong>Photos:</strong> ${photos.length} item(s)</li>`;
                        }
                        html += '</ul>';
                    } else {
                        html = '<p style="color: var(--text); margin: 0;">—</p>';
                    }
                }
            }

            if (entered) {
                entered.innerHTML = html;
            }
        }

        function removeComplexEntry(sectionId, idx) {
            // v1.1: use custom confirm modal instead of native confirm()
            showConfirm('Remove this entry?', () => {
                complexData[sectionId].splice(idx, 1);
                saveFormData();
                updateEnteredEntries(sectionId);
                updateSectionBadges();
                updateProgress();
                updatePreview(sectionId);
                if (sectionId === 9) {
                    updatePreview(10);
                    updateEnteredEntries(10);
                }
            });
        }

        function attachEventListeners(sectionId) {
            const form = document.getElementById(`entryForm-${sectionId}`);
            if (!form) return;

            const inputs = form.querySelectorAll('input[type="text"], input[type="date"], textarea, select');
            inputs.forEach(input => {
                input.addEventListener('change', () => {
                    saveSimpleEntry(sectionId);
                    updateProgress();
                });
                input.addEventListener('input', () => {
                    saveSimpleEntry(sectionId);
                    updateProgress();
                });
            });
        }

        function saveSimpleEntry(sectionId) {
            const form = document.getElementById(`entryForm-${sectionId}`);
            if (!form) return;

            formData[sectionId] = {};
            form.querySelectorAll('input[type="text"], input[type="date"], textarea, select').forEach(input => {
                if (input.name) {
                    formData[sectionId][input.name] = input.value;
                }
            });

            saveFormData();
            updateEnteredEntries(sectionId);
            updateSectionBadges();
            setTimeout(() => updatePreview(sectionId), 100);
        }

        let tempComplexPhotos = {};

        function handleComplexPhotoUpload(event, sectionId) {
            const files = event.target.files;
            if (!tempComplexPhotos[sectionId]) {
                tempComplexPhotos[sectionId] = [];
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tempComplexPhotos[sectionId].push({ base64: e.target.result, name: file.name });
                    renderTempPhotoGallery(sectionId);
                };
                reader.readAsDataURL(file);
            });
        }

        function renderTempPhotoGallery(sectionId) {
            const gallery = document.getElementById(`gallery-${sectionId}`);
            if (!gallery) return;

            gallery.innerHTML = (tempComplexPhotos[sectionId] || []).map((photo, idx) => `
                <div class="photo-item">
                    <img src="${photo.base64 || photo}" alt="photo">
                    <button class="photo-remove" onclick="removeTempPhoto(${sectionId}, ${idx})">✕</button>
                </div>
            `).join('');
        }

        function removeTempPhoto(sectionId, idx) {
            tempComplexPhotos[sectionId].splice(idx, 1);
            renderTempPhotoGallery(sectionId);
        }

        function handlePhotoUpload(event, sectionId) {
            const files = event.target.files;
            if (!photoData[sectionId]) {
                photoData[sectionId] = [];
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    photoData[sectionId].push({
                        base64: e.target.result,
                        name: file.name
                    });
                    renderPhotoGallery(sectionId);
                    saveFormData();
                    updateEnteredEntries(sectionId);
                    updateSectionBadges();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPhotoGallery(sectionId) {
            const gallery = document.getElementById(`gallery-${sectionId}`);
            if (!gallery || !photoData[sectionId]) return;

            gallery.innerHTML = photoData[sectionId].map((photo, idx) => {
                const photoSrc = photo.base64 || photo.data || '';
                return `
                <div class="photo-item">
                    <img src="${photoSrc}" alt="photo">
                    <button class="photo-remove" onclick="removePhoto(${sectionId}, ${idx})">✕</button>
                </div>`;
            }).join('');
        }

        function removePhoto(sectionId, idx) {
            photoData[sectionId].splice(idx, 1);
            renderPhotoGallery(sectionId);
            saveFormData();
            updateEnteredEntries(sectionId);
            updateSectionBadges();
            updateProgress();
        }

        function saveFormData() {
            try {
                localStorage.setItem('assessmentForm', JSON.stringify(formData));
                localStorage.setItem('assessmentPhotos', JSON.stringify(photoData));
                localStorage.setItem('complexData', JSON.stringify(complexData));
                lastSavedTime = new Date(); // v1.1
                showSaveIndicator();
                // v1.1: auto-persist to named session if one is active
                if (currentSessionName !== 'Untitled Assessment' || Object.keys(formData).length > 0) {
                    debouncedSessionSave();
                }
            } catch (e) {
                console.error('Failed to save form data:', e);
                alert('Warning: Could not save data. Storage may be full or quota exceeded.');
            }
        }

        // v1.1: Debounced session save (avoid thrashing localStorage)
        function debouncedSessionSave() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                persistCurrentSession();
            }, 1200);
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            if (!indicator) return;
            indicator.classList.remove('saving');
            indicator.classList.add('saved');
            // v1.1: show timestamp
            const timeStr = lastSavedTime ? lastSavedTime.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
            indicator.innerHTML = `<i class="fas fa-check"></i><span>Saved ${timeStr}</span>`;
            clearTimeout(window.saveIndicatorTimeout);
            window.saveIndicatorTimeout = setTimeout(() => {
                indicator.classList.remove('saved');
            }, 3000);
        }

        function loadFormData() {
            try {
                const saved = localStorage.getItem('assessmentForm');
                const savedPhotos = localStorage.getItem('assessmentPhotos');
                const savedComplex = localStorage.getItem('complexData');

                if (saved) formData = JSON.parse(saved);
                if (savedPhotos) photoData = JSON.parse(savedPhotos);
                if (savedComplex) complexData = JSON.parse(savedComplex);
            } catch (e) {
                console.warn('Could not load saved data from storage:', e);
                // Continue with empty data - user can still use the form
            }
        }

        function copyTableToWord() {
            let html = '<style>.table-style { width: 100%; border-collapse: collapse; margin: 20px 0; } .table-style th { background: #3D5C45; color: #F5F1E8; padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600; } .table-style td { padding: 12px; border: 1px solid #ddd; } .table-style tr:nth-child(even) { background: #FAF9F6; }</style>';

            // Only copy table for current section
            if (currentSection === 7) {
                // Exterior
                if (complexData[7] && complexData[7].length > 0) {
                    html += '<h3 style="color: #3D5C45; margin: 24px 0 12px 0;">EXTERIOR ELEMENTS</h3>';
                    html += '<table class="table-style"><tr><th>Location/Area</th><th>Ref Number</th><th>Description</th></tr>';
                    complexData[7].forEach(entry => {
                        html += `<tr><td>${entry.room || '—'}</td><td><strong>${entry.part}</strong></td><td>${entry.notes}</td></tr>`;
                    });
                    html += '</table>';
                } else {
                    html += '<p style="color: #3D5C45;">No exterior data entered for this section.</p>';
                }
            } else if (currentSection === 8) {
                // Interior
                if (complexData[8] && complexData[8].length > 0) {
                    html += '<h3 style="color: #3D5C45; margin: 24px 0 12px 0;">INTERIOR SPACES</h3>';
                    html += '<table class="table-style"><tr><th>Room/Space</th><th>Ref Number</th><th>Description</th></tr>';
                    complexData[8].forEach(entry => {
                        html += `<tr><td>${entry.room || '—'}</td><td><strong>${entry.part}</strong></td><td>${entry.notes}</td></tr>`;
                    });
                    html += '</table>';
                } else {
                    html += '<p style="color: #3D5C45;">No interior data entered for this section.</p>';
                }
            } else if (currentSection === 9) {
                // Defects
                if (complexData[9] && complexData[9].length > 0) {
                    html += '<h3 style="color: #3D5C45; margin: 24px 0 12px 0;">IDENTIFIED DEFECTS & RECOMMENDATIONS</h3>';
                    html += '<table class="table-style"><tr><th>Element</th><th>Ref #</th><th>Description</th><th>Recommended Works</th><th>Priority</th></tr>';
                    complexData[9].forEach((entry, idx) => {
                        const priorityColor = entry.priority === 'Urgent' ? '#9B5B5B' :
                                             entry.priority === 'Important' ? '#C4A56B' : '#A8C9C3';

        function updateProgress() {
            let filledSections = 0;
            let totalSections = 10;

            // Check each section's data in formData and complexData, not DOM
            for (let i = 1; i <= totalSections; i++) {
                let hasFilled = false;

                // Check formData for this section
                if (formData[i] && Object.keys(formData[i]).length > 0) {
                    for (let key in formData[i]) {
                        if (formData[i][key] && String(formData[i][key]).trim()) {
                            hasFilled = true;
                            break;
                        }
                    }
                }

                // Check complexData for this section
                if (!hasFilled && complexData[i] && complexData[i].length > 0) {
                    hasFilled = true;
                }

                // Check photoData for this section
                if (!hasFilled && photoData[i] && photoData[i].length > 0) {
                    hasFilled = true;
                }

                if (hasFilled) filledSections++;
            }

            const percentage = Math.round((filledSections / totalSections) * 100);
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            if (progressFill) {
                progressFill.style.width = percentage + '%';
            }
            if (progressText) {
                progressText.textContent = percentage + '% Complete';
            }
        }

        function handleJSONImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const fileContent = e.target.result;
                    console.log('File content length:', fileContent.length);
                    console.log('First 200 chars:', fileContent.substring(0, 200));

                    const importedData = JSON.parse(fileContent);
                    console.log('Parsed JSON successfully');
                    console.log('Has formData:', !!importedData.formData);
                    console.log('Has complexData:', !!importedData.complexData);
                    console.log('formData keys:', Object.keys(importedData.formData || {}));
                    console.log('complexData keys:', Object.keys(importedData.complexData || {}));

                    if (!importedData.formData || !importedData.complexData) {
                        alert('Invalid file format. Please use a file exported from this tool.\n\nMissing: ' +
                            (!importedData.formData ? 'formData ' : '') +
                            (!importedData.complexData ? 'complexData' : ''));
                        return;
                    }

                    if (confirm('This will replace all current form data. Continue?')) {
                        formData = importedData.formData;
                        complexData = importedData.complexData;
                        photoData = importedData.photoData || {};

                        console.log('Data assigned successfully');
                        saveFormData();
                        updateProgress();
                        updateSectionBadges();

                        // Update all sections in sidebar
                        for (let i = 1; i <= 10; i++) {
                            updateEnteredEntries(i);
                            updatePreview(i);
                        }

                        showSection(1);

                        // Refresh the form
                        setTimeout(() => {
                            const inputs = document.querySelectorAll('input, textarea, select');
                            inputs.forEach(input => {
                                if (input.name && formData[currentSection] && formData[currentSection][input.name]) {
                                    input.value = formData[currentSection][input.name];
                                }
                            });
                            updateProgress();
                            updatePreview(currentSection);
                            showNotification('✓ Data imported successfully');
                        }, 100);
                    }
                } catch (error) {
                    console.error('Import error details:', error);
                    console.error('Error stack:', error.stack);
                    alert('Error: ' + error.message + '\n\nPlease check browser console (F12) for details.');
                }
            };
            reader.onerror = (error) => {
                console.error('File read error:', error);
                alert('Could not read file. Please check the file and try again.');
            };
            reader.readAsText(file);

            // Reset input so same file can be selected again
            event.target.value = '';
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: var(--primary);
                color: var(--cream);
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                z-index: 1001;
                animation: slideUp 0.3s ease;
                box-shadow: 0 4px 12px rgba(61, 92, 69, 0.3);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2500);
        }

        // ── Custom Confirm Modal ────────────────────────────────────
        function showConfirm(message, onConfirm) {
            pendingConfirmCallback = onConfirm;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.add('active');
        }

        function resolveConfirm(confirmed) {
            document.getElementById('confirmModal').classList.remove('active');
            if (confirmed && pendingConfirmCallback) {
                const cb = pendingConfirmCallback;
                pendingConfirmCallback = null;
                cb();
            } else {
                pendingConfirmCallback = null;
            }
        }

        // ── Session Management ──────────────────────────────────────
        function loadSessions() {
            try {
                sessions = JSON.parse(localStorage.getItem('assessmentSessions') || '{}');
            } catch(e) { sessions = {}; }
            // Restore last active session name
            const lastName = localStorage.getItem('lastSessionName');
            if (lastName) currentSessionName = lastName;
            updateSessionBar();
        }

        function persistCurrentSession() {
            // Only persist if there's some data to save
            const hasData = Object.keys(formData).length > 0 ||
                            (complexData[9] || []).length > 0 ||
                            (complexData[7] || []).length > 0 ||
                            (complexData[8] || []).length > 0;
            if (!hasData) return;

            sessions[currentSessionName] = {
                name: currentSessionName,
                savedAt: new Date().toISOString(),
                formData: JSON.parse(JSON.stringify(formData)),
                complexData: JSON.parse(JSON.stringify(complexData)),
                photoData: photoData // photos are large, stored by reference
            };
            try {
                localStorage.setItem('assessmentSessions', JSON.stringify(sessions));
                localStorage.setItem('lastSessionName', currentSessionName);
            } catch(e) {
                console.warn('Could not persist session (storage may be full)');
            }
            updateSessionBar();
        }

        function updateSessionBar() {
            const nameEl = document.getElementById('currentSessionName');
            if (nameEl) nameEl.textContent = currentSessionName;
        }

        function openSessionModal() {
            renderSessionList();
            document.getElementById('sessionModal').classList.add('active');
        }

        function closeSessionModal() {
            document.getElementById('sessionModal').classList.remove('active');
        }

        function renderSessionList() {
            const list = document.getElementById('sessionList');
            const entries = Object.values(sessions).sort((a,b) => new Date(b.savedAt) - new Date(a.savedAt));

            if (entries.length === 0) {
                list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px 0;font-size:13px;"><i class="fas fa-folder-open" style="font-size:24px;display:block;margin-bottom:8px;opacity:0.4;"></i>No saved assessments yet.<br>Use "Save Current As…" to name and save this assessment.</p>';
                return;
            }

            list.innerHTML = entries.map(s => {
                const dateStr = new Date(s.savedAt).toLocaleString([], {dateStyle:'medium', timeStyle:'short'});
                const address = s.formData?.[1]?.address || 'No address entered';
                const defects = (s.complexData?.[9] || []).length;
                const isCurrent = s.name === currentSessionName;
                return `<div class="session-list-item ${isCurrent ? 'current' : ''}">
                    <div class="session-item-info">
                        <div class="session-item-name">${escapeHtml(s.name)}${isCurrent ? '&nbsp;<span style="font-size:10px;background:var(--good);color:white;padding:2px 6px;border-radius:4px;font-weight:600;">Active</span>' : ''}</div>
                        <div class="session-item-meta">${escapeHtml(address)} · ${defects} defect${defects !== 1 ? 's' : ''} · ${dateStr}</div>
                    </div>
                    ${!isCurrent ? `<button onclick="loadSession('${escapeAttr(s.name)}')" class="btn-add" style="margin:0;padding:8px 14px;font-size:12px;white-space:nowrap;flex-shrink:0;">Open</button>` : ''}
                    <button onclick="deleteSessionConfirm('${escapeAttr(s.name)}')" class="btn-remove" style="margin:0;flex-shrink:0;" title="Delete">✕</button>
                </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function escapeAttr(str) {
            return String(str).replace(/'/g, "\\'");
        }

        function newSession() {
            showConfirm('Start a new blank assessment? Unsaved changes to the current assessment will be lost.', () => {
                currentSessionName = 'Assessment ' + new Date().toLocaleDateString('en-AU');
                formData = {};
                photoData = {};
                complexData = { 7: [], 8: [], 9: [] };
                saveFormData();
                updateSessionBar();
                updateCompletionDots();
                showSection(1);
                updateProgress();
                updateSectionBadges();
                closeSessionModal();
                showNotification('✓ New assessment started');
            });
        }

        function saveSessionAs() {
            const defaultName = formData[1]?.address
                ? formData[1].address.split(',')[0].trim()
                : 'Assessment ' + new Date().toLocaleDateString('en-AU');
            const name = prompt('Save assessment as:', defaultName);
            if (!name || !name.trim()) return;
            currentSessionName = name.trim();
            persistCurrentSession();
            renderSessionList();
            showNotification(`✓ Saved as "${currentSessionName}"`);
        }

        function loadSession(name) {
            const session = sessions[name];
            if (!session) { showNotification('Session not found'); return; }
            showConfirm(`Load "${name}"? Current unsaved changes will be replaced.`, () => {
                currentSessionName = name;
                formData = session.formData || {};
                complexData = session.complexData || { 7: [], 8: [], 9: [] };
                photoData = session.photoData || {};
                saveFormData();
                updateSessionBar();
                showSection(1);
                updateProgress();
                updateSectionBadges();
                updateCompletionDots();
                closeSessionModal();
                showNotification(`✓ Loaded "${name}"`);
            });
        }

        function deleteSessionConfirm(name) {
            showConfirm(`Delete "${name}"? This cannot be undone.`, () => {
                delete sessions[name];
                try { localStorage.setItem('assessmentSessions', JSON.stringify(sessions)); } catch(e) {}
                renderSessionList();
                updateSessionBar();
                showNotification(`Deleted "${name}"`);
            });
        }
